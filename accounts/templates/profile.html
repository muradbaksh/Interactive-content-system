{% extends 'base.html' %}
{% load crispy_forms_tags%}
{% block content %}

<h2>My Profile</h2>

<form method="POST">
    {% csrf_token %}
    <!-- {{form | crispy}}-->
    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Update Profile
    </button>
</form>
<a href="{% url 'password_change' %}" class="btn btn-danger mt-3">
    Change Password
</a>
{% endblock %}
